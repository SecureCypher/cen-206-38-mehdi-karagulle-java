name: CI — Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & Run Tests
        run: mvn clean test --batch-mode --no-transfer-progress
        working-directory: ./petreminder-app

      - name: Generate JaCoCo Report
        run: mvn jacoco:report --batch-mode --no-transfer-progress
        working-directory: ./petreminder-app

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: petreminder-app/target/site/jacoco/
          retention-days: 30
